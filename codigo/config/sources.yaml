  - url: https://etsiit.ugr.es/sites/centros/etsiit/public/inline-files/Calendario%20TFG%202025-2026.pdf
    label: "Calendario TFG ETSIIT 2025-2026"
    category: calendario

  # ── Horarios (PDFs inline-files) ──
  - url: https://etsiit.ugr.es/sites/centros/etsiit/public/inline-files/Horarios%20GII%20%2825-26%29.pdf
    label: "Horarios Grado Ing. Informática 25-26"
    category: calendario

  # NOTA: Horarios de GITT, GIIM y GIIADE excluidos — fuera del alcance (solo GII)

  # ── Plazos y trámites secretaría (PDFs inline-files) ──
  - url: https://etsiit.ugr.es/sites/centros/etsiit/public/inline-files/PLAZOS%20DE%20INTERES%20CURSO%202025-26.pdf
    label: "Plazos de interés curso 2025-26 (versión original)"
    category: tramites

  - url: https://etsiit.ugr.es/sites/centros/etsiit/public/inline-files/ADMISI%C3%93N%20A%20ESTUDIOS%20DE%20GRADO_2_3.pdf
    label: "Impreso admisión a estudios de grado"
    category: tramites
